# 프로덕션(EC2): 이 호스트엔 이미 공용 리버스 프록시 eta-caddy 가 80/443 을 점유 중.
# 우리 컨테이너는 호스트 포트를 열지 않고 eta-caddy 와 같은 네트워크에 붙어,
# eta-caddy 가 calendar.viram.dev 를 받아 http://calendar:5000 으로 넘긴다.
#
#   eta-caddy (443, TLS)  →  calendar:5000 (Flask/gunicorn)
#
# 사용:  ./deploy.sh
# 로그:  docker compose -f docker-compose.prod.yml logs -f
services:
  calendar:
    build: .
    image: calendar
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "5000"          # 호스트에 직접 노출 안 함 — eta-caddy 만 내부망으로 접근
    volumes:
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json          # 토큰 자동 갱신분 호스트에 보존
      - ./categories.json:/app/categories.json # 큐레이션 호스트에 보존
    networks:
      proxy:
        aliases:
          - calendar     # eta-caddy 가 이 이름으로 접근 (reverse_proxy calendar:5000)

networks:
  # eta-caddy 가 사용하는 기존 네트워크를 외부 네트워크로 참조.
  # .env 의 PROXY_NETWORK 에 실제 이름을 넣는다 (예: eta_default).
  proxy:
    external: true
    name: ${PROXY_NETWORK:-eta_default}
